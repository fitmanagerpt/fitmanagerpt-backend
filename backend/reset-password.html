<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir password - FitManagerPT</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #050b1a;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      color: #fff;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #1e293b;
      background: #0b1220;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
    }

    button {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 16px;
      background: #22c55e;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.45;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redefinir password</h1>
    <p>Introduz a nova password da tua conta FitManagerPT.</p>

    <form id="resetForm">
      <div class="field">
        <label for="newPassword">Nova password</label>
        <input id="newPassword" type="password" minlength="8" required />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar nova password</label>
        <input id="confirmPassword" type="password" minlength="8" required />
      </div>

      <button id="submitBtn" type="submit">Atualizar password</button>
    </form>

    <div id="message" class="message"></div>
    <div class="small">Este link só funciona com um token válido e dentro do prazo.</div>
  </div>

  <script>
    const API_BASE_URL = 'http://127.0.0.1:8000';
    const form = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('message');

    function showMessage(text, type) {
      messageBox.className = `message ${type}`;
      messageBox.textContent = text;
    }

    function getTokenFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = getTokenFromUrl();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!token) {
        showMessage('Token em falta. Abre novamente o link recebido por email.', 'error');
        return;
      }

      if (newPassword.length < 8) {
        showMessage('A password deve ter pelo menos 8 caracteres.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('As passwords não coincidem.', 'error');
        return;
      }

      submitBtn.disabled = true;
      showMessage('A atualizar password...', 'success');

      try {
        const response = await fetch(`${API_BASE_URL}/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: token,
            new_password: newPassword,
            confirm_password: confirmPassword,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Erro ao redefinir password');
        }

        showMessage('Password atualizada com sucesso. Já podes voltar à app e fazer login.', 'success');
        form.reset();
      } catch (error) {
        showMessage(error.message || 'Erro inesperado ao redefinir password.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    if (!getTokenFromUrl()) {
      showMessage('Token em falta. Este link não é válido sem token.', 'error');
      submitBtn.disabled = true;
    }
  </script>
</body>
</html>
